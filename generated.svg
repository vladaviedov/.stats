<svg xmlns="http://www.w3.org/2000/svg" width="350" height="150" viewBox="0 0 350 150">
	<style>
		.background {
			width: 100%;
			height: 100%;
			fill: #262626;
		}
		
		text {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
		}

		.title {
			font-size: 15px;
			fill: #fabd2f;
		}

		.bar-segment {
			height: 100%;
		}

		.lang-name {
			font-size: 11px;
			fill: #b8bb26
		}

		.delta-arrow {
			font-size: 14px;
			fill: #00ff00;
		}
	</style>

	<!-- Background box -->
	<rect class="background" />

	<!-- Title -->
	<text class="title" x="10%" y="20%">
		Most Used Languages
	</text>
	
	<!-- Percentage Bar -->
	<svg x="10%" y="30%" width="80%" height="5%">
		<!-- __template_bar__ <rect class="bar-segment" x="$prev%" width="$cur%" fill="$color" /> __end__ -->
		<rect class="bar-segment" x="0.00%" width="41.00%" fill="#555555" /><rect class="bar-segment" x="41.00%" width="28.57%" fill="#f34b7d" /><rect class="bar-segment" x="69.57%" width="8.97%" fill="#b07219" /><rect class="bar-segment" x="78.55%" width="5.82%" fill="#00ADD8" /><rect class="bar-segment" x="84.36%" width="4.03%" fill="#f1e05a" /><rect class="bar-segment" x="88.39%" width="3.65%" fill="#427819" /><rect class="bar-segment" x="92.04%" width="1.78%" fill="#89e051" /><rect class="bar-segment" x="93.82%" width="1.55%" fill="#A97BFF" />
	</svg>
	
	<!-- Language List -->
	<svg x="10%" y="40%" width="80%" height="50%">
		<!-- __template_list__ <svg y="$yCoord" x="$xCoord">
			<circle cx="5" cy="6" r="5" fill="$color" />
			<text class="lang-name" x="15" y="10">
				$name - $cur%
			</text>
			<text class="delta-arrow" dx="125" y="10" style="opacity: $delta%">
				↑
			</text>
		</svg> __end__ -->
		<svg y="0%" x="0%">
			<circle cx="5" cy="6" r="5" fill="#555555" />
			<text class="lang-name" x="15" y="10">
				C - 41.00%
			</text>
			<text class="delta-arrow" dx="125" y="10" style="opacity: 38.04%">
				↑
			</text>
		</svg><svg y="25%" x="0%">
			<circle cx="5" cy="6" r="5" fill="#f34b7d" />
			<text class="lang-name" x="15" y="10">
				C++ - 28.57%
			</text>
			<text class="delta-arrow" dx="125" y="10" style="opacity: 0.00%">
				↑
			</text>
		</svg><svg y="50%" x="0%">
			<circle cx="5" cy="6" r="5" fill="#b07219" />
			<text class="lang-name" x="15" y="10">
				Java - 8.97%
			</text>
			<text class="delta-arrow" dx="125" y="10" style="opacity: 0.00%">
				↑
			</text>
		</svg><svg y="75%" x="0%">
			<circle cx="5" cy="6" r="5" fill="#00ADD8" />
			<text class="lang-name" x="15" y="10">
				Go - 5.82%
			</text>
			<text class="delta-arrow" dx="125" y="10" style="opacity: 0.00%">
				↑
			</text>
		</svg><svg y="0%" x="50%">
			<circle cx="5" cy="6" r="5" fill="#f1e05a" />
			<text class="lang-name" x="15" y="10">
				JavaScript - 4.03%
			</text>
			<text class="delta-arrow" dx="125" y="10" style="opacity: 0.00%">
				↑
			</text>
		</svg><svg y="25%" x="50%">
			<circle cx="5" cy="6" r="5" fill="#427819" />
			<text class="lang-name" x="15" y="10">
				Makefile - 3.65%
			</text>
			<text class="delta-arrow" dx="125" y="10" style="opacity: 44.57%">
				↑
			</text>
		</svg><svg y="50%" x="50%">
			<circle cx="5" cy="6" r="5" fill="#89e051" />
			<text class="lang-name" x="15" y="10">
				Shell - 1.78%
			</text>
			<text class="delta-arrow" dx="125" y="10" style="opacity: 67.39%">
				↑
			</text>
		</svg><svg y="75%" x="50%">
			<circle cx="5" cy="6" r="5" fill="#A97BFF" />
			<text class="lang-name" x="15" y="10">
				Kotlin - 1.55%
			</text>
			<text class="delta-arrow" dx="125" y="10" style="opacity: 0.00%">
				↑
			</text>
		</svg>
	</svg>
</svg>
